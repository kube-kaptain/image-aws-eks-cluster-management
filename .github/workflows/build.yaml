name: Dockerfile Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  packages: write
  checks: write

jobs:
  build:
    uses: kube-kaptain/buildon-github-actions/.github/workflows/docker-build-dockerfile.yaml@1.0.70
    with:
      tag-version-max-parts: 2
      docker-platform: 'linux/amd64,linux/arm64'
      dockerfile-sub-path-linux-amd64: 'src/docker'
      dockerfile-sub-path-linux-arm64: 'src/docker'
      hook-pre-docker-prepare-script-sub-path: 'bin/copy-scripts-to-docker-context.bash'
